version: '3.8'

# EzAi-MFGNINJA Simplified Docker Compose - Ready to Run
# AI-Powered Manufacturing Intelligence Platform

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ezai-postgres
    environment:
      POSTGRES_DB: ezai_mfgninja
      POSTGRES_USER: ezai_admin
      POSTGRES_PASSWORD: ezai_secure_2025!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezai_admin -d ezai_mfgninja"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: ezai-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ezai_admin
      MONGO_INITDB_ROOT_PASSWORD: ezai_mongo_2025!
      MONGO_INITDB_DATABASE: ezai_mfgninja
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ezai-redis
    command: redis-server --requirepass ezai_redis_2025!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "ezai_redis_2025!", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    container_name: ezai-api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-mock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mock Backend Service (Development)
  backend-mock:
    image: node:18-alpine
    container_name: ezai-backend-mock
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - ../backend-mock.js:/app/server.js:ro
    command: sh -c "npm init -y && npm install express cors && node server.js"
    environment:
      - NODE_ENV=development
      - PORT=4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Application
  frontend:
    image: node:18-alpine
    container_name: ezai-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run build && npm start"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost
      - NEXT_PUBLIC_WS_BASE_URL=ws://localhost
    depends_on:
      - backend-mock
      - postgres
      - mongodb
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: ezai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: ezai-grafana
    ports:
      - "3010:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ezai_grafana_2025!
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: ezai-network
    driver: bridge
