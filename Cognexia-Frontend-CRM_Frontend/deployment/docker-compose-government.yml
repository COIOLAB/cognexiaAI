version: '3.8'

# ===============================================================================
# EzAi-MFGNINJA Government Certification Docker Compose
# AI-Powered Manufacturing Intelligence Platform
# 
# COMPLIANCE STANDARDS:
# - ISO 27001 (Information Security Management)
# - SOC 2 Type II (Security & Availability)
# - NIST Cybersecurity Framework
# - FedRAMP (Federal Risk and Authorization Management Program)
# - GDPR (General Data Protection Regulation)
# - SOX (Sarbanes-Oxley Act)
# 
# SECURITY FEATURES:
# - Zero-Trust Network Architecture
# - End-to-End Encryption (AES-256)
# - Multi-Factor Authentication
# - Real-time Threat Detection
# - Complete Audit Trail
# - Role-Based Access Control (RBAC)
# ===============================================================================

services:
  # ==================== FRONTEND APPLICATION ====================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-frontend-gov
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://localhost
      - NEXT_PUBLIC_WS_BASE_URL=wss://localhost
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - SECURITY_LEVEL=maximum
      - AUDIT_ENABLED=true
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ==================== CORE BACKEND SERVICES ====================

  # HR Service - Human Resources Management (85% Complete)
  hr-service:
    build:
      context: ../backend/hr
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-hr-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVICE_NAME=hr
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - ENCRYPTION_ENABLED=true
      - SECURITY_LEVEL=maximum
      - COMPLIANCE_LEVEL=full
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/hr/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Finance & Accounting Service (90% Complete)
  finance-service:
    build:
      context: ../backend/finance-accounting
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-finance-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3002
      - SERVICE_NAME=finance-accounting
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - ENCRYPTION_ENABLED=true
      - SOX_COMPLIANCE=enabled
      - FINANCIAL_AUDIT=enabled
    ports:
      - "3002:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/v1/finance-accounting/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Manufacturing Service (90% Complete) - Quantum & AI Powered
  manufacturing-service:
    build:
      context: ../backend/manufacturing
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-manufacturing-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3003
      - SERVICE_NAME=manufacturing
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - ENCRYPTION_ENABLED=true
      - QUANTUM_OPTIMIZATION=enabled
      - BLOCKCHAIN_TRACEABILITY=enabled
      - AI_ANALYTICS=enabled
    ports:
      - "3003:3003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/v1/manufacturing/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # Supply Chain Service (75% Complete)
  supply-chain-service:
    build:
      context: ../backend/supply-chain
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-supply-chain-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3004
      - SERVICE_NAME=supply-chain
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - BLOCKCHAIN_SUPPLY_CHAIN=enabled
      - IOT_INTEGRATION=enabled
    ports:
      - "3004:3004"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/v1/supply-chain/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Inventory Service (90% Complete)
  inventory-service:
    build:
      context: ../backend/inventory
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-inventory-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3005
      - SERVICE_NAME=inventory
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - REAL_TIME_TRACKING=enabled
      - BLOCKCHAIN_INVENTORY=enabled
    ports:
      - "3005:3005"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/v1/inventory/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Production Planning Service (85% Complete)
  production-planning-service:
    build:
      context: ../backend/production-planning
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-production-planning-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3006
      - SERVICE_NAME=production-planning
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - AI_SCHEDULING=enabled
      - QUANTUM_OPTIMIZATION=enabled
    ports:
      - "3006:3006"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/api/v1/production-planning/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # CRM Service (88% Complete)
  crm-service:
    build:
      context: ../backend/crm
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-crm-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3007
      - SERVICE_NAME=crm
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - AI_CUSTOMER_INSIGHTS=enabled
      - GDPR_COMPLIANCE=enabled
    ports:
      - "3007:3007"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/api/v1/crm/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Procurement Service (85% Complete)
  procurement-service:
    build:
      context: ../backend/procurement
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-procurement-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3008
      - SERVICE_NAME=procurement
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - SUPPLIER_VERIFICATION=enabled
      - CONTRACT_BLOCKCHAIN=enabled
    ports:
      - "3008:3008"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/api/v1/procurement/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Sales & Marketing Service (95% Complete) - AI-Powered
  sales-marketing-service:
    build:
      context: ../backend/sales-marketing
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - GOVERNMENT_CERTIFICATION=enabled
    container_name: ezai-sales-marketing-service-gov
    environment:
      - NODE_ENV=production
      - PORT=3009
      - SERVICE_NAME=sales-marketing
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOVERNMENT_CERTIFICATION=enabled
      - AUDIT_ENABLED=true
      - AI_MARKETING=enabled
      - NEURAL_INTELLIGENCE=enabled
      - QUANTUM_CAMPAIGN_OPTIMIZATION=enabled
    ports:
      - "3009:3009"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/api/v1/sales-marketing/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 768M
          cpus: '0.75'

  # ==================== INFRASTRUCTURE & MONITORING ====================

  # API Gateway - Government-Grade Nginx
  api-gateway:
    image: nginx:alpine
    container_name: ezai-api-gateway-gov
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-government.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/government-security.conf:/etc/nginx/conf.d/security.conf:ro
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - GOVERNMENT_CERTIFICATION=enabled
      - SECURITY_LEVEL=maximum
    depends_on:
      - hr-service
      - finance-service
      - manufacturing-service
      - supply-chain-service
      - inventory-service
      - production-planning-service
      - crm-service
      - procurement-service
      - sales-marketing-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

  # Prometheus - Government-Grade Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ezai-prometheus-gov
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--storage.tsdb.retention.time=90d'
      - '--web.external-url=http://localhost:9090'
      - '--web.route-prefix=/'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-government.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    environment:
      - GOVERNMENT_CERTIFICATION=enabled
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Grafana - Government-Grade Analytics Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ezai-grafana-gov
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ezai_grafana_2025!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3010
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-ezai_grafana_secret_2025}
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ALLOW_EMBEDDING=false
      - GOVERNMENT_CERTIFICATION=enabled
    ports:
      - "3010:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/government-config.ini:/etc/grafana/grafana.ini:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ElasticSearch - Government-Grade Log Management
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ezai-elasticsearch-gov
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ezai_elastic_2025!}
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - GOVERNMENT_CERTIFICATION=enabled
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD:-ezai_elastic_2025!} -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # Kibana - Government-Grade Log Analysis
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ezai-kibana-gov
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-ezai_elastic_2025!}
      - SERVER_NAME=ezai-kibana
      - SERVER_PUBLICBASEURL=http://localhost:5601
      - GOVERNMENT_CERTIFICATION=enabled
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Redis - Government-Grade Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: ezai-redis-gov
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ezai_redis_2025!}
      --appendonly yes
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-ezai_redis_2025!}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ezai-secure-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

# ==================== VOLUMES (PERSISTENT STORAGE) ====================
volumes:
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/grafana
  elasticsearch_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/elasticsearch
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis

# ==================== NETWORKS (ZERO-TRUST ARCHITECTURE) ====================
networks:
  ezai-secure-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
    ipam:
      driver: default
      config:
        - subnet: 172.23.0.0/16
          gateway: 172.23.0.1
    labels:
      - "government.certification=enabled"
      - "security.level=maximum"
      - "compliance.standards=iso27001,soc2,nist,fedramp"

