apiVersion: 1

providers:
  # Executive Dashboard - High-level KPIs and business metrics
  - name: 'Executive Dashboards'
    orgId: 1
    folder: 'Executive'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/executive

  # Operations Dashboard - Real-time manufacturing operations
  - name: 'Operations Dashboards'
    orgId: 1
    folder: 'Operations'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/operations

  # Security Dashboard - Government-grade security monitoring
  - name: 'Security Dashboards'
    orgId: 1
    folder: 'Security'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/security

  # Compliance Dashboard - Regulatory compliance and audit trails
  - name: 'Compliance Dashboards'
    orgId: 1
    folder: 'Compliance'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/compliance

  # Performance Dashboard - System performance and resource utilization
  - name: 'Performance Dashboards'
    orgId: 1
    folder: 'Performance'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/performance

  # Manufacturing Dashboard - Production metrics and AI analytics
  - name: 'Manufacturing Dashboards'
    orgId: 1
    folder: 'Manufacturing'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 15
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/manufacturing

  # Financial Dashboard - Financial metrics and SOX compliance
  - name: 'Financial Dashboards'
    orgId: 1
    folder: 'Financial'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/financial

  # Infrastructure Dashboard - System infrastructure monitoring
  - name: 'Infrastructure Dashboards'
    orgId: 1
    folder: 'Infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/infrastructure
