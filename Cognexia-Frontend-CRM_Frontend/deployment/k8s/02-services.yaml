        - configMapRef:
            name: ezai-config
        - secretRef:
            name: ezai-secrets
        resources:
          requests:
            memory: "768Mi"
            cpu: "300m"
          limits:
            memory: "1.5Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /api/v1/sales-marketing/health
            port: 3009
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/sales-marketing/ready
            port: 3009
          initialDelaySeconds: 30
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: ai-models
          mountPath: /app/models
      volumes:
      - name: tmp
        emptyDir: {}
      - name: ai-models
        persistentVolumeClaim:
          claimName: ai-models-pvc

