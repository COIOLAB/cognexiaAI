# Frontend Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ezai-mfgninja-gov
  labels:
    app: ezai-mfgninja
    component: frontend
    tier: presentation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ezai-mfgninja
      component: frontend
  template:
    metadata:
      labels:
        app: ezai-mfgninja
        component: frontend
        tier: presentation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: frontend
        image: ezai-mfgninja/frontend:government-latest
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ezai-config
              key: NODE_ENV
        - name: GOVERNMENT_CERTIFICATION
          valueFrom:
            configMapKeyRef:
              name: ezai-config
              key: GOVERNMENT_CERTIFICATION
        - name: NEXT_PUBLIC_API_BASE_URL
          value: "https://api.ezai-mfgninja.gov"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.next/cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ezai-mfgninja-gov
  labels:
    app: ezai-mfgninja
    component: frontend
spec:
  selector:
    app: ezai-mfgninja
    component: frontend
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

