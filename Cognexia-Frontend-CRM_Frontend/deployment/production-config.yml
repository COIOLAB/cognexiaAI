# EzAi-MFGNINJA Production Deployment Configuration
# Industry 5.0 ERP Manufacturing Intelligence Platform
# Version: 3.0.0

version: '3.8'

# Global Configuration
global:
  app_name: "EzAi-MFGNINJA"
  version: "3.0.0"
  description: "AI-Powered Manufacturing Intelligence Platform"
  environment: "production"
  domain: "ezai-mfgninja.com"
  
# Docker Compose Services Configuration
services:
  # API Gateway / Load Balancer
  gateway:
    image: nginx:alpine
    container_name: ezai-mfgninja-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    environment:
      - NGINX_HOST=ezai-mfgninja.com
      - NGINX_PORT=80
    networks:
      - ezai-network
    restart: unless-stopped
    depends_on:
      - hr-service
      - finance-service
      - manufacturing-service

  # Core Backend Services
  
  # HR Module Service
  hr-service:
    build:
      context: ../backend/modules/01-hr
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-hr
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_hr_db
      - REDIS_URL=redis://redis:6379/1
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/hr
    ports:
      - "3001:3001"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/hr/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Finance & Accounting Service
  finance-service:
    build:
      context: ../backend/modules/23-finance-accounting
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-finance
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_finance_db
      - REDIS_URL=redis://redis:6379/2
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/finance-accounting
    ports:
      - "3002:3002"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/v1/finance-accounting/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Manufacturing Service
  manufacturing-service:
    build:
      context: ../backend/modules/02-manufacturing
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-manufacturing
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_manufacturing_db
      - REDIS_URL=redis://redis:6379/3
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/manufacturing
    ports:
      - "3003:3003"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/v1/manufacturing/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Supply Chain Service
  supply-chain-service:
    build:
      context: ../backend/modules/04-supply-chain
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-supply-chain
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_supply_chain_db
      - REDIS_URL=redis://redis:6379/4
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/supply-chain
    ports:
      - "3004:3004"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Inventory Service
  inventory-service:
    build:
      context: ../backend/modules/05-inventory
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-inventory
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_inventory_db
      - REDIS_URL=redis://redis:6379/5
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/inventory
    ports:
      - "3005:3005"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Production Planning Service
  production-planning-service:
    build:
      context: ../backend/modules/08-production-planning
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-production-planning
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_production_db
      - REDIS_URL=redis://redis:6379/6
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/production-planning
    ports:
      - "3006:3006"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # CRM Service
  crm-service:
    build:
      context: ../backend/modules/03-crm
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-crm
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_crm_db
      - REDIS_URL=redis://redis:6379/7
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/crm
    ports:
      - "3007:3007"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Procurement Service
  procurement-service:
    build:
      context: ../backend/modules/06-procurement
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-procurement
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_procurement_db
      - REDIS_URL=redis://redis:6379/8
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v1/procurement
    ports:
      - "3008:3008"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Sales & Marketing Service
  sales-marketing-service:
    build:
      context: ../backend/modules/07-sales-marketing
      dockerfile: Dockerfile
    container_name: ezai-mfgninja-sales-marketing
    environment:
      - NODE_ENV=production
      - PORT=3009
      - DATABASE_URL=postgresql://ezai_user:${DB_PASSWORD}@postgres:5432/ezai_sales_marketing_db
      - REDIS_URL=redis://redis:6379/9
      - JWT_SECRET=${JWT_SECRET}
      - API_PREFIX=/api/v3/sales-marketing
    ports:
      - "3009:3009"
    networks:
      - ezai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://api.ezai-mfgninja.com
        - NEXT_PUBLIC_WS_BASE_URL=wss://api.ezai-mfgninja.com
    container_name: ezai-mfgninja-frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=https://api.ezai-mfgninja.com
      - NEXT_PUBLIC_WS_BASE_URL=wss://api.ezai-mfgninja.com
    ports:
      - "3000:3000"
    networks:
      - ezai-network
    restart: unless-stopped
    depends_on:
      - gateway

  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: ezai-mfgninja-postgres
    environment:
      - POSTGRES_USER=ezai_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=ezai_main_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    networks:
      - ezai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezai_user -d ezai_main_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for document storage
  mongodb:
    image: mongo:6.0
    container_name: ezai-mfgninja-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=ezai_mongo_user
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - ezai-network
    restart: unless-stopped

  # Redis for caching and real-time data
  redis:
    image: redis:7-alpine
    container_name: ezai-mfgninja-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ezai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Monitoring and Analytics
  
  # Prometheus for metrics
  prometheus:
    image: prom/prometheus
    container_name: ezai-mfgninja-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ezai-network
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana
    container_name: ezai-mfgninja-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_DOMAIN=grafana.ezai-mfgninja.com
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/var/lib/grafana/dashboards
    ports:
      - "3010:3000"
    networks:
      - ezai-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ElasticSearch for logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ezai-mfgninja-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ezai-network
    restart: unless-stopped

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ezai-mfgninja-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana.ezai-mfgninja.com
    ports:
      - "5601:5601"
    networks:
      - ezai-network
    restart: unless-stopped
    depends_on:
      - elasticsearch

# Volumes
volumes:
  postgres_data:
    driver: local
    name: ezai-mfgninja-postgres-data
  mongodb_data:
    driver: local
    name: ezai-mfgninja-mongodb-data
  redis_data:
    driver: local
    name: ezai-mfgninja-redis-data
  prometheus_data:
    driver: local
    name: ezai-mfgninja-prometheus-data
  grafana_data:
    driver: local
    name: ezai-mfgninja-grafana-data
  elasticsearch_data:
    driver: local
    name: ezai-mfgninja-elasticsearch-data

# Networks
networks:
  ezai-network:
    driver: bridge
    name: ezai-mfgninja-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Environment Variables Template
# Create a .env file with these variables:
# DB_PASSWORD=your_secure_postgres_password
# MONGO_PASSWORD=your_secure_mongo_password
# REDIS_PASSWORD=your_secure_redis_password
# JWT_SECRET=your_jwt_secret_key_minimum_32_characters
# GRAFANA_PASSWORD=your_grafana_admin_password
